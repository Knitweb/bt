name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out EURBT
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip pytest -e .

      - name: Compile
        run: python -m py_compile src/eurbt/*.py scripts/build_dex_research.py

      - name: Tests
        run: python -m pytest -q

